<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misi Ejen Ali: Cyberaya Bersih (iOS Optimized)</title>
    <style>
        :root {
            --cyber-blue: #00d4ff;
            --cyber-yellow: #f1c40f;
            --cyber-red: #e74c3c;
            --cyber-dark: #2c3e50;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(to bottom, #1e3799, #4a69bd);
        }

        #skyline {
            position: absolute;
            bottom: 30%;
            width: 200%;
            height: 150px;
            background: repeating-linear-gradient(90deg, #2c3e50 0px, #2c3e50 40px, transparent 40px, transparent 80px);
            opacity: 0.5;
            animation: moveCity 20s linear infinite;
        }

        @keyframes moveCity {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        #road {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30%;
            background: #34495e;
            border-top: 5px solid #bdc3c7;
        }

        #car {
            position: absolute;
            bottom: 15%;
            left: 50px;
            width: 80px;
            height: 50px;
            background: var(--cyber-blue);
            border-radius: 10px 20px 5px 5px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,212,255,0.5);
        }

        #car::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 10px;
            width: 20px;
            height: 20px;
            background: #000;
            border-radius: 50%;
            box-shadow: 50px 0 0 #000;
        }

        #obstacle {
            position: absolute;
            bottom: 15%;
            right: 50px;
            width: 40px;
            height: 60px;
            background: var(--cyber-red);
            transition: all 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid white;
            z-index: 9;
        }

        #ui-layer {
            position: relative;
            z-index: 20;
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding-top: 20px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid var(--cyber-blue);
            margin-bottom: 15px;
        }

        #sentence-card {
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 0 #bdc3c7;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
        }

        #icon-box { font-size: 2.5rem; margin-bottom: 5px; }

        #mic-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            background: var(--cyber-blue);
            color: white;
            font-size: 35px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,212,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            -webkit-tap-highlight-color: transparent;
        }

        #mic-btn.listening {
            background: var(--cyber-red);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        #next-btn {
            display: none;
            margin: 10px auto;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: var(--cyber-yellow);
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            box-shadow: 0 4px 0 #d4ac0d;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
            height: 24px;
            text-shadow: 1px 1px 2px black;
        }

        @media (max-width: 480px) {
            #sentence-card { font-size: 1rem; padding: 15px; }
            #car { width: 70px; height: 40px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="skyline"></div>
    <div id="road"></div>
    <div id="car"></div>
    <div id="obstacle">🚧</div>

    <div id="ui-layer">
        <div class="stats">
            <div>TAHAP: <span id="current-level">1</span>/11</div>
            <div>MARKAH: <span id="score">0</span></div>
        </div>

        <div id="sentence-card">
            <div id="icon-box">🚗</div>
            <div id="text-display">Sila tekan butang Mikrofon untuk memulakan misi.</div>
        </div>

        <button id="mic-btn" aria-label="Microphone">🎤</button>
        <button id="next-btn">TAHAP SETERUSNYA ➔</button>
        <div id="message">Sedia untuk beraksi?</div>
    </div>
</div>

<script>
    const ayatMisi = [
        "Pada suatu pagi yang cerah, Ejen Ali menerima satu misi penting daripada pihak MATA melalui peranti IRIS miliknya.",
        "Misi tersebut adalah untuk memastikan kawasan taman rekreasi di Cyberaya berada dalam keadaan bersih dan selamat untuk orang awam.",
        "Ejen Ali segera bergerak ke lokasi yang ditetapkan dengan penuh semangat dan tanggungjawab.",
        "Setibanya di taman tersebut, dia mendapati terdapat banyak sampah yang dibuang merata-rata.",
        "Selain itu, beberapa peralatan permainan juga kelihatan rosak dan berbahaya kepada kanak-kanak.",
        "Ejen Ali berasa risau kerana keadaan itu boleh menyebabkan kemalangan jika tidak diatasi dengan segera.",
        "Dia mula mengutip sampah dan mengasingkannya ke dalam tong kitar semula yang disediakan.",
        "Kemudian, dia menutup kawasan permainan yang rosak dengan pita keselamatan sebagai langkah berjaga-jaga.",
        "Tidak lama kemudian, beberapa orang kanak-kanak datang untuk bermain di taman tersebut.",
        "Ejen Ali menasihati mereka supaya sentiasa menjaga kebersihan dan berhati-hati ketika menggunakan peralatan permainan.",
        "Akhirnya, kawasan taman itu kembali bersih, selamat dan selesa untuk digunakan oleh semua orang."
    ];

    const icons = ["🌅", "🛡️", "🏃", "🗑️", "⚠️", "😟", "♻️", "🚧", "🧒", "🗣️", "✨"];

    let currentLevel = 0;
    let score = 0;
    let isLocked = false;

    // Elemen DOM
    const car = document.getElementById('car');
    const obstacle = document.getElementById('obstacle');
    const textDisplay = document.getElementById('text-display');
    const iconBox = document.getElementById('icon-box');
    const micBtn = document.getElementById('mic-btn');
    const nextBtn = document.getElementById('next-btn');
    const msgDisplay = document.getElementById('message');

    // Inisialisasi Pengecaman Suara (iOS Safari Support)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        textDisplay.innerText = "Pelayar tidak menyokong pengecaman suara. Sila gunakan Safari di iPhone atau Chrome di Android.";
        micBtn.style.display = "none";
    }

    const recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if (recognition) {
        recognition.lang = "ms-MY";
        recognition.continuous = false;
        recognition.interimResults = false;
    }

    function loadLevel() {
        if (currentLevel >= ayatMisi.length) {
            textDisplay.innerText = "MISI SELESAI! Cyberaya kini bersih dan selamat.";
            iconBox.innerText = "🏆";
            micBtn.style.display = "none";
            msgDisplay.innerText = "Markah Akhir: " + score;
            return;
        }

        isLocked = false;
        textDisplay.innerText = ayatMisi[currentLevel];
        iconBox.innerText = icons[currentLevel];
        document.getElementById('current-level').innerText = currentLevel + 1;
        nextBtn.style.display = "none";
        micBtn.style.display = "flex";
        msgDisplay.innerText = "Tekan mikrofon & sebut ayat di atas";
        msgDisplay.style.color = "white";
        
        // Reset Visual
        car.style.transform = "translateX(0)";
        obstacle.style.right = "50px";
        obstacle.style.opacity = "1";
    }

    // Event Klik Mikrofon (Optimasi iOS)
    micBtn.addEventListener('click', function() {
        if(isLocked || !recognition) return;
        
        try {
            recognition.start();
        } catch (e) {
            recognition.stop();
            setTimeout(() => recognition.start(), 100);
        }
    });

    recognition.onstart = () => {
        micBtn.classList.add('listening');
        msgDisplay.innerText = "Mendengar (Sebut sekarang)...";
    };

    recognition.onresult = (event) => {
        micBtn.classList.remove('listening');
        const result = event.results[0][0].transcript.toLowerCase();
        const target = ayatMisi[currentLevel].toLowerCase();
        
        console.log("Dikesan:", result);
        const accuracy = checkSimilarity(result, target);
        
        if (accuracy > 0.70) { // Toleransi 70% untuk murid sekolah
            handleSuccess();
        } else {
            handleFailure();
        }
    };

    recognition.onerror = (event) => {
        micBtn.classList.remove('listening');
        console.error("Speech Error:", event.error);
        if(event.error === 'not-allowed') {
            msgDisplay.innerText = "Ralat: Sila benarkan akses mikrofon di Tetapan Safari.";
        } else {
            msgDisplay.innerText = "Tiada suara dikesan. Cuba lagi.";
        }
    };

    function handleSuccess() {
        isLocked = true;
        score += 10;
        document.getElementById('score').innerText = score;
        
        msgDisplay.innerText = "Hebat! Sebutan tepat.";
        msgDisplay.style.color = "#2ecc71";
        
        // Animasi Kereta & Halangan
        obstacle.style.opacity = "0";
        obstacle.style.right = "-50px";
        car.style.transform = "translateX(150px)";
        
        setTimeout(() => {
            nextBtn.style.display = "block";
            micBtn.style.display = "none";
        }, 500);
    }

    function handleFailure() {
        msgDisplay.innerText = "Kurang tepat. Sila cuba lagi.";
        msgDisplay.style.color = "var(--cyber-red)";
        
        // Efek langgar
        car.style.transform = "translateX(20px) rotate(-5deg)";
        setTimeout(() => car.style.transform = "translateX(0) rotate(0)", 150);
    }

    function checkSimilarity(s1, s2) {
        const words1 = s1.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/);
        const words2 = s2.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/);
        let matches = 0;
        
        words1.forEach(word => {
            if (words2.includes(word)) matches++;
        });
        
        return matches / words2.length;
    }

    nextBtn.addEventListener('click', () => {
        currentLevel++;
        loadLevel();
    });

    // Jalankan pertama kali
    loadLevel();
</script>

</body>
</html>
